sop_id: "OPS-007"
name: 外网狩猎任务
version: "1.1"
description: 对指定主题进行外网深度调研，收集最佳实践、开源方案、技术文档
inputs:
  - name: topic
    description: 调研主题（如：长上下文记忆管理、token优化）
  - name: depth
    description: 调研深度（shallow/deep/expert）
  - name: output_format
    description: 输出格式（report/summary/comparison）
outputs:
  - name: research_result
    description: 调研结果（包含方案、对比、推荐）
  - name: sources
    description: 信息来源列表
  - name: confidence
    description: 结论可信度（high/medium/low）

# ── LLM 可控性配置 ──────────────────────────────────────────────────
# 该SOP所有阶段默认使用 execute profile（高确定性，temperature=0.1）
llm_config:
  profile: execute
  top_p: 0.8
  max_tokens_per_phase: 2000

stages:
  - phase_id: "1"
    name: 信息收集
    description: 搜索外网技术文章、GitHub项目、论文
    skill: web-researcher
    # P2: 自动抓取真实网页内容，解决主题偏移根因
    web_fetch_query: "{topic}"
    web_fetch_max_results: 5
    web_fetch_max_chars: 5000
    llm_config:
      profile: execute
      max_tokens: 2000
    output_template: |
      ## 信息列表
      ### [文章/项目1标题]
      - URL: [完整链接]
      - 核心观点: [100字以内摘要]
      - 来源类型: [技术文章/GitHub项目/论文]
      ### [文章/项目2标题]
      （同上格式）
    constraint: |
      - 必须包含至少3条信息
      - 每条必须有完整URL
      - 禁止编造不存在的链接
      - 不要开头说明或结尾总结
    prompt: |
      对"{topic}"进行深度调研，收集：
      1. 英文技术文章（Medium、Dev.to、官方博客）
      2. 中文技术文章（知乎、CSDN、技术博客）
      3. GitHub开源项目（star > 100）
      4. 最新论文（arXiv、Google Scholar）

      输出要求：必须严格按照以下格式输出，不要添加任何解释或说明：

      ## 信息列表

      ### [文章/项目1标题]
      - URL: [完整链接]
      - 核心观点: [100字以内摘要]
      - 来源类型: [技术文章/GitHub项目/论文]

      ### [文章/项目2标题]
      - URL: [完整链接]
      - 核心观点: [100字以内摘要]
      - 来源类型: [技术文章/GitHub项目/论文]

      （继续列出所有收集到的信息）

      重要：只输出以上内容，不要有以下内容：
      - 不要开头说明（如"好的，我来收集信息..."）
      - 不要结尾总结（如"综上所述..."）
      - 不要元说明（如"这是一个结构化列表..."）

  - phase_id: "2"
    name: 方案提取
    description: 从收集的信息中提取可落地的技术方案
    skill: tech-analyzer
    llm_config:
      profile: execute
      max_tokens: 2500
    output_template: |
      ## 方案对比表
      | 方案名称 | 技术原理 | 优点 | 缺点 | 适用场景 | 实施难度 | 推荐度 |
      |---------|---------|------|------|---------|---------|--------|
      | [方案1] | [原理] | [优点] | [缺点] | [场景] | [简单/中等/复杂] | [高/中/低] |
      ## 详细分析
      ### [方案1名称]
      **原理**: [说明]
      **效果**: [数据或描述]
      **代码量**: [预估]
    constraint: |
      - 必须包含至少2个方案的完整对比
      - 实施难度只能是"简单"、"中等"或"复杂"
      - 推荐度只能是"高"、"中"或"低"
      - 禁止编造不存在的技术方案
    prompt: |
      分析收集的信息，提取：
      1. 技术方案列表（名称、原理、效果）
      2. 开源框架对比（优点、缺点、适用场景）
      3. 实施难度评估（简单/中等/复杂）

      输出要求：必须严格按照以下格式输出，不要添加任何解释或说明：

      ## 方案对比表

      | 方案名称 | 技术原理 | 优点 | 缺点 | 适用场景 | 实施难度 | 推荐度 |
      |---------|---------|------|------|---------|---------|--------|
      | [方案1] | [原理简述] | [优点1, 优点2] | [缺点1, 缺点2] | [场景描述] | [简单/中等/复杂] | [高/中/低] |
      | [方案2] | [原理简述] | [优点1, 优点2] | [缺点1, 缺点2] | [场景描述] | [简单/中等/复杂] | [高/中/低] |

      ## 详细分析

      ### [方案1名称]
      **原理**: [详细说明]
      **效果**: [预期效果数据或描述]
      **代码量**: [预估代码行数或文件数]

      ### [方案2名称]
      **原理**: [详细说明]
      **效果**: [预期效果数据或描述]
      **代码量**: [预估代码行数或文件数]

      重要：只输出以上内容，不要有以下内容：
      - 不要开头说明（如"好的，我来分析..."）
      - 不要结尾总结
      - 不要元说明

  - phase_id: "3"
    name: 可行性验证
    description: 验证方案在FROST-SOP中的可行性
    skill: feasibility-checker
    llm_config:
      profile: execute
      max_tokens: 2000
    output_template: |
      ## 可行性排序
      ### 1. [方案名称] - 推荐度：[高/中/低]
      **适合FROST-SOP架构**: [是/否 - 原因]
      **实施成本**:
        - 时间：[X小时/X天]
        - 代码量：[X个文件/Y行代码]
      **预期效果**:
        - Token降低：[X%]
        - 性能提升：[描述]
        - 副作用：[如有]
      **风险评估**: [低/中/高 - 具体风险]
      ## 推荐实施顺序
      1. [方案A] - 原因：[为什么先做]
    constraint: |
      - 每个方案必须包含量化的实施成本（时间+代码量）
      - 推荐度只能是"高"、"中"或"低"
      - 风险评估只能是"低"、"中"或"高"
      - 必须给出明确的实施顺序，禁止并列
    prompt: |
      针对每个方案，评估：
      1. 是否适合FROST-SOP架构
      2. 实施成本（时间、代码量）
      3. 预期效果（token降低%、性能提升）

      输出要求：必须严格按照以下格式输出，不要添加任何解释或说明：

      ## 可行性排序

      ### 1. [方案名称] - 推荐度：[高/中/低]
      **适合FROST-SOP架构**: [是/否 - 原因]
      **实施成本**:
        - 时间：[X小时/X天]
        - 代码量：[X个文件/Y行代码]
      **预期效果**:
        - Token降低：[X%]
        - 性能提升：[描述]
        - 副作用：[如有]
      **风险评估**: [低/中/高 - 具体风险]

      ### 2. [方案名称] - 推荐度：[高/中/低]
      （同上格式）

      ## 推荐实施顺序

      1. [方案A] - 原因：[为什么先做]
      2. [方案B] - 原因：[为什么后做]

      重要：只输出以上内容，不要有以下内容：
      - 不要开头说明
      - 不要结尾总结
      - 不要元说明

  - phase_id: "4"
    name: 报告生成
    description: 生成结构化调研报告
    skill: tech-writer
    llm_config:
      profile: execute
      max_tokens: 3000
    output_template: |
      # [调研主题] - 外网深度调研报告
      ## 执行摘要
      [200字以内核心发现和建议]
      ## 技术方案详解
      ### [方案1名称]
      **背景**: [为什么需要]
      **原理**: [技术原理]
      **实施步骤**: 1.[步骤1] 2.[步骤2] 3.[步骤3]
      **预期效果**: [具体数据]
      ## 开源框架对比
      | 框架名称 | Star数 | 最后更新 | 优点 | 缺点 | 适用场景 |
      ## 落地路线图
      ### 第1阶段（本周）：[阶段名称]
      - [任务1]
      ## 关键资源链接
      - [标题](URL) - [描述]
      ## 结论与建议
      [明确实施建议]
    constraint: |
      - 执行摘要必须在200字以内
      - 每个方案必须包含实施步骤（至少3步）
      - 所有URL必须是完整可访问链接
      - 结论必须给出明确的"先做/后做/不做"判断
    prompt: |
      生成调研报告，包含：
      1. 执行摘要
      2. 技术方案详解
      3. 开源框架对比
      4. 落地路线图
      5. 关键资源链接

      输出要求：必须严格按照以下格式输出完整的Markdown报告，不要输出代码块标记（如```markdown）：

      # [调研主题] - 外网深度调研报告

      ## 执行摘要
      [200字以内的核心发现和建议]

      ## 技术方案详解

      ### [方案1名称]
      **背景**: [为什么需要这个方案]
      **原理**: [技术原理详细说明]
      **实施步骤**:
      1. [步骤1]
      2. [步骤2]
      3. [步骤3]
      **预期效果**: [具体数据或描述]

      ### [方案2名称]
      （同上格式）

      ## 开源框架对比

      | 框架名称 | Star数 | 最后更新 | 优点 | 缺点 | 适用场景 |
      |---------|--------|---------|------|------|---------|
      | [框架1] | [Xk] | [YYYY-MM] | [优点] | [缺点] | [场景] |

      ## 落地路线图

      ### 第1阶段（本周）：[阶段名称]
      - [任务1]
      - [任务2]

      ### 第2阶段（下周）：[阶段名称]
      - [任务1]

      ## 关键资源链接

      - [文章/项目标题](URL) - [一句话描述]
      - [文章/项目标题](URL) - [一句话描述]

      ## 结论与建议

      [基于调研发现的结论，给出明确的实施建议]

      重要：
      - 这是一份完整的、可直接使用的报告
      - 不要添加"这是一个报告模板"之类的元说明
      - 所有URL必须是完整的、可访问的链接
required_stages:
  - "信息收集"
  - "报告生成"
forbidden_skills:
  - "direct_db_write"
