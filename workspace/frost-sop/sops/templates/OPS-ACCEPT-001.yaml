sop_id: OPS-ACCEPT-001
name: 系统交付验收
version: "1.0"
description: |
  FROST-SOP 新版本上线前的验收流程。
  由廖亮（用户/开发者）亲自执行，确认系统可用。

  验收标准：全部 5 个阶段通过，或明确标记为"跳过"并说明原因。

category: system
required_stages:
  - 环境检查
  - 冒烟测试
  - 端到端任务
  - 成本验证
  - 打标签

llm_config:
  profile: execute
  temperature: 0.1
  max_tokens_per_phase: 2000

stages:
  - stage_id: "1"
    name: 环境检查
    skill: system-check
    output_format: markdown
    constraint: |
      - 必须逐项检查，不能跳过
      - 任何一项失败，标记整个阶段为 FAILED
    requirement: |
      检查廖亮的本地环境是否满足 FROST-SOP 运行要求：

      ## 检查清单

      1. [ ] Python 3.11+ 已安装（`python --version`）
      2. [ ] Node.js 18+ 已安装（`node --version`）
      3. [ ] `.env` 文件存在，且包含 `DEEPSEEK_API_KEY`
      4. [ ] `data/` 目录存在（SQLite 数据库位置）
      5. [ ] `frontend/node_modules/` 存在（前端依赖已安装）

      ## 输出格式

      ```
      ## 环境检查结果

      | 检查项 | 状态 | 说明 |
      |--------|------|------|
      | Python 版本 | ✅/❌ | x.x.x |
      | Node.js 版本 | ✅/❌ | x.x.x |
      | .env 文件 | ✅/❌ | 存在/缺失 |
      | DEEPSEEK_API_KEY | ✅/❌ | 已设置/未设置 |
      | data/ 目录 | ✅/❌ | 存在/缺失 |
      | 前端依赖 | ✅/❌ | 已安装/未安装 |

      ### 总体评估
      - 状态：PASS / FAIL
      - 阻塞项（如有）：...
      ```

  - stage_id: "2"
    name: 冒烟测试
    skill: test-runner
    output_format: markdown
    constraint: |
      - 必须运行 pytest tests/smoke/
      - LLM 测试可能因 API 余额跳过，这是允许的
      - 非 LLM 测试（数据库、Skill、SOP）必须通过
    requirement: |
      运行冒烟测试，验证系统核心链路：

      ## 执行命令

      ```bash
      cd workspace/frost-sop
      pytest tests/smoke/ -m smoke -v
      ```

      ## 验收标准

      1. [ ] test_database_read_write — 必须 PASS
      2. [ ] test_skill_v2_error_handling — 必须 PASS
      3. [ ] test_skill_v2_input_validation — 必须 PASS
      4. [ ] test_sop_load_and_validate — 必须 PASS
      5. [ ] test_llm_online_call — 允许 SKIP（API 余额不足时）
      6. [ ] test_temperature_profile_effective — 允许 SKIP（API 余额不足时）

      ## 输出格式

      ```
      ## 冒烟测试结果

      | 测试 | 结果 | 说明 |
      |------|------|------|
      | 数据库读写 | PASS/FAIL/SKIP | ... |
      | Skill 错误处理 | PASS/FAIL | ... |
      | Skill 输入验证 | PASS/FAIL | ... |
      | SOP 加载验证 | PASS/FAIL | ... |
      | LLM 在线调用 | PASS/SKIP | ... |
      | Temperature 生效 | PASS/SKIP | ... |

      ### 总体评估
      - 状态：PASS / FAIL
      - 阻塞项（如有）：...
      ```

  - stage_id: "3"
    name: 端到端任务
    skill: task-executor
    output_format: markdown
    constraint: |
      - 必须选择一个真实业务场景，不能用"测试任务"敷衍
      - 输出质量由廖亮主观判断是否"可用"
      - 如果输出质量差，标记为 FAILED 并记录原因
    requirement: |
      执行一个真实任务，验证端到端流程：

      ## 推荐任务

      用 OPS-007（上下文优化）做一次调研：
      - 主题：长护险培训平台竞品分析
      - 或：心域探险目标用户画像调研
      - 或：任何你当前工作中需要调研的话题

      ## 执行方式

      1. 启动系统：`双击 start.bat`
      2. 打开浏览器：`http://localhost:3000`
      3. 创建任务：选择 SOP = OPS-007，输入任务描述
      4. 等待执行完成（约 5-10 分钟）
      5. 审阅输出结果

      ## 验收标准

      1. [ ] 任务创建成功
      2. [ ] 4 个阶段全部完成（信息收集、摘要生成、输出优化、归档）
      3. [ ] 输出有实质性内容（不是空或"模拟数据"）
      4. [ ] 廖亮认为输出"可用"或"基本可用"（不需要完美）

      ## 输出格式

      ```
      ## 端到端任务验收

      - 任务主题：...
      - SOP 模板：OPS-007
      - 执行耗时：X 分钟
      - Token 消耗：X tokens（约 ¥X.XX）

      ### 阶段完成度
      | 阶段 | 状态 | 说明 |
      |------|------|------|
      | 信息收集 | ✅/❌ | ... |
      | 摘要生成 | ✅/❌ | ... |
      | 输出优化 | ✅/❌ | ... |
      | 归档 | ✅/❌ | ... |

      ### 输出质量评估
      - 廖亮评分：1-5 星
      - 可用性：可用 / 基本可用 / 不可用
      - 主要问题（如有）：...

      ### 总体评估
      - 状态：PASS / FAIL
      ```

  - stage_id: "4"
    name: 成本验证
    skill: cost-check
    output_format: markdown
    constraint: |
      - 单次任务 Token 消耗必须 < ¥1（约 2000 tokens）
      - 如果超支，检查是否有不必要的重复调用
    requirement: |
      验证单次任务的成本在可接受范围内：

      ## 检查项

      1. [ ] 查看 `data/frost_sop.db` 中的 `cost_log` 表，或查看前端"成本面板"
      2. [ ] 确认最近一条记录的 `cost_cny` < 1.0
      3. [ ] 确认月度累计 `SUM(cost_cny)` < 300（月度预算）

      ## 输出格式

      ```
      ## 成本验证

      - 单次任务成本：¥X.XX
      - 月度累计成本：¥XXX.XX
      - 预算剩余：¥XXX.XX

      ### 总体评估
      - 状态：PASS / FAIL（单次 > ¥1 为 FAIL）
      ```

  - stage_id: "5"
    name: 打标签
    skill: git-tagger
    output_format: markdown
    constraint: |
      - 只有通过全部验收后，才能打 stable 标签
      - 标签格式：vX.Y-stable（如 v7.1-stable）
      - 必须同时推送 GitHub 和 Gitee
    requirement: |
      验收通过后，为当前代码打稳定标签：

      ## 执行命令

      ```bash
      cd workspace/frost-sop
      git tag -a v7.1-stable -m "FROST-SOP V7.1 稳定版

      验收记录：
      - 日期：2026-06-XX
      - 验收人：廖亮
      - 状态：全部通过
      - 主要修复：skill.py 错误处理、测试体系、db.py 安全检查"

      git push github v7.1-stable
      git push origin v7.1-stable
      ```

      ## 验收标准

      1. [ ] 标签已本地创建
      2. [ ] 标签已推送到 GitHub
      3. [ ] 标签已推送到 Gitee

      ## 输出格式

      ```
      ## 版本标签

      - 标签：v7.1-stable
      - 日期：2026-06-XX
      - 验收人：廖亮
      - GitHub：已推送 / 未推送
      - Gitee：已推送 / 未推送

      ### 总体评估
      - 状态：PASS / FAIL
      ```
