# FROST-SOP V4.0 技能卡: validate_sop
# 校验SOP模板合规性

intent: "校验SOP（标准操作流程）模板的合规性、完整性和可执行性"
applicable_when: |
  新SOP模板创建后、模板修改后、定期审计时需要对模板进行合规性检查。
  检查项包括：必填字段完整性、阶段依赖关系合理性、输入输出匹配、
  触发条件有效性、回退策略完备性等。
not_applicable_when: |
  模板在草稿阶段、仅做格式调整时不需要完整校验。
  运行时SOP执行验证应使用执行引擎的内置检查。

inputs:
  - name: sop_template_path
    type: string
    required: true
    description: "SOP模板YAML文件的路径"
    example: "sops/templates/DEV-001.yaml"
  - name: sop_content
    type: string
    required: false
    description: "SOP模板的完整YAML内容（如果不提供文件路径，则直接校验内容）"
  - name: validation_level
    type: string
    required: false
    description: "校验级别：basic（基本字段）/ standard（标准检查）/ strict（严格检查）"
    example: "standard"

outputs:
  - name: is_valid
    type: bool
    required: true
    description: "是否通过校验"
  - name: errors
    type: list
    required: false
    description: "错误列表（阻塞性问题）"
  - name: warnings
    type: list
    required: false
    description: "警告列表（非阻塞性建议）"
  - name: suggestions
    type: list
    required: false
    description: "改进建议"

preconditions:
  - "SOP模板文件存在或sop_content已提供"
  - "YAML格式正确可解析"

postconditions:
  - "返回值包含is_valid布尔值"
  - "校验失败时errors不为空"

completion_criteria:
  - "所有validation_level对应的检查项已完成评估"
  - "所有错误和警告均已记录"

failure_signals:
  - "YAML解析失败"
  - "文件不存在"
  - "模板结构不符合SOP规范"

requires_capabilities:
  - "yaml_parsing"
  - "schema_validation"
  - "dependency_analysis"

bindings:
  - platform: "rule_engine"
    prompt_template: |
      校验SOP模板：{sop_template_path}
      校验级别：{validation_level}
    input_mapping:
      file_path: "sop_template_path"
    output_mapping:
      is_valid: "valid"
      errors: "errors"
      warnings: "warnings"
    known_limitations:
      - "rule_engine仅检查结构，不检查语义合理性"
    workaround: "结合 call_llm 进行语义层面的深度校验"
