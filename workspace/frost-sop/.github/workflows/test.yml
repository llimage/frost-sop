name: FROST-SOP 全量测试

on:
  push:
    branches: [master, main, develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "experiments/**"
      - "frontend/**"
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FROST_TESTING: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: 静态分析（快速失败）
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff==0.15.20 mypy==2.1.0 bandit==1.8.3

      - name: Ruff Lint
        run: ruff check --output-format=github .

      - name: Mypy Type Check
        run: mypy agents/ api/ core/ skills/ stores/ --ignore-missing-imports

      - name: Bandit Security Scan
        run: bandit -r agents/ api/ core/ skills/ stores/ -ll

  # ──────────────────────────────────────────────────────────
  # Job 2: 单元测试 + 覆盖率
  # ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit==1.8.3

      - name: Run unit tests (serial — SQLite)
        run: |
          python -X utf8 -m pytest tests/ \
            -m "unit" \
            --timeout 60 \
            --cov \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=55 \
            -s \
            -q

      - name: Upload coverage to Codecov (optional)
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ──────────────────────────────────────────────────────────
  # Job 3: 集成测试
  # ──────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run integration tests
        run: |
          python -X utf8 -m pytest tests/ \
            -m "integration" \
            --timeout 120 \
            -s \
            -q

  # ──────────────────────────────────────────────────────────
  # Job 4: 属性测试 (Hypothesis)
  # ──────────────────────────────────────────────────────────
  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run property-based tests
        run: |
          python -X utf8 -m pytest tests/ \
            -m "property" \
            --timeout 120 \
            --hypothesis-show-statistics \
            -s \
            -q

  # ──────────────────────────────────────────────────────────
  # Job 5: 变异测试 (Mutmut) — 仅主分支
  # ──────────────────────────────────────────────────────────
  mutation-tests:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run mutation tests (sampled)
        run: |
          # Run mutmut on a subset for CI time budget
          # Full run: mutmut run --paths-to-mutate "agents/ api/ core/ skills/ stores/"
          mutmut run --paths-to-mutate "core/" --runner "python -X utf8 -m pytest -x --tb=no -s -m 'unit'" || true
          mutmut results

  # ──────────────────────────────────────────────────────────
  # Job 6: 性能基准测试
  # ──────────────────────────────────────────────────────────
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run benchmarks
        run: |
          python -X utf8 -m pytest tests/ \
            -m "benchmark" \
            --benchmark-only \
            --benchmark-json=benchmark_results.json \
            -s \
            -q

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json

  # ──────────────────────────────────────────────────────────
  # Job 7: 冒烟测试（真实 LLM）
  # ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (Real LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[smoke]')
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run smoke tests
        run: |
          pytest tests/smoke/ -m smoke -v --timeout 180

  # ──────────────────────────────────────────────────────────
  # Job 8: 汇总报告
  # ──────────────────────────────────────────────────────────
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, property-tests, smoke-test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## FROST-SOP 测试报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          for job in lint unit-tests integration-tests property-tests smoke-test; do
            result="${{ needs.$job.result }}"
            if [ "$result" = "success" ]; then
              echo "| $job | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
            elif [ "$result" = "skipped" ]; then
              echo "| $job | ⏭️ Skip |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $job | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
            fi
          done
